name: Deploy Web App to Cloudflare Pages

on:
  push:
    branches:
      - main
    paths:
      - 'web-app/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Replace Supabase config
        run: |
          sed -i "s|YOUR_SUPABASE_URL|${{ secrets.SUPABASE_URL }}|g" web-app/js/supabase.js
          sed -i "s|YOUR_SUPABASE_ANON_KEY|${{ secrets.SUPABASE_ANON_KEY }}|g" web-app/js/supabase.js
          sed -i "s|YOUR_SHARED_PASSWORD|${{ secrets.SHARED_PASSWORD }}|g" web-app/js/supabase.js

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy web-app --project-name=saba-vidios
